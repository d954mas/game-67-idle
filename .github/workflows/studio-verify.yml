name: Studio verification

on:
  pull_request:
    paths-ignore:
      - 'ai_studio/taskboard/items/**'
      - '**/*.md'
      - '.claude/**/*.md'
      - '.codex/skills/**/*.md'
  push:
    branches: [master]
    paths-ignore:
      - 'ai_studio/taskboard/items/**'
      - '**/*.md'
      - '.claude/**/*.md'
      - '.codex/skills/**/*.md'

permissions:
  contents: read

env:
  EMSDK_VERSION: '4.0.10'

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Fetch archived quality fixture tags
        run: >-
          git fetch --no-tags --depth=1 origin
          +refs/tags/rb-dark-rpg-vibejam1-2026-07-05:refs/tags/rb-dark-rpg-vibejam1-2026-07-05
      - name: Resolve native compiler cache key
        id: native-cache-key
        shell: bash
        run: echo "engine_revision=$(git -C external/neotolis-engine rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Restore native compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ runner.os }}-${{ steps.native-cache-key.outputs.engine_revision }}-${{ hashFiles('templates/template/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.native-cache-key.outputs.engine_revision }}-
            ${{ runner.os }}-
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai_studio/python/requirements.direct.txt
      - name: Install native Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-bin \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            xvfb
      - name: Prepare space-free CMake path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmakeBin = Split-Path -Parent (Get-Command cmake).Source
          $cmakeRoot = Split-Path -Parent $cmakeBin
          New-Item -ItemType Directory -Force .toolchains | Out-Null
          New-Item -ItemType Junction -Path .toolchains/cmake -Target $cmakeRoot | Out-Null
          "$(Resolve-Path .toolchains/cmake/bin)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Bootstrap root Python environment (Ubuntu)
        if: runner.os == 'Linux'
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$pythonLocation/bin/python"
      - name: Bootstrap root Python environment (Windows)
        if: runner.os == 'Windows'
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$env:pythonLocation\python.exe"
      - name: Restore deterministic Emscripten
        id: emsdk-cache
        uses: actions/cache@v5
        with:
          path: .toolchains/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}
      - name: Install deterministic Emscripten
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "$EMSDK_VERSION" https://github.com/emscripten-core/emsdk.git .toolchains/emsdk
          ./.toolchains/emsdk/emsdk install "$EMSDK_VERSION"
      - name: Activate deterministic Emscripten
        shell: bash
        run: |
          ./.toolchains/emsdk/emsdk activate "$EMSDK_VERSION"
          EMSDK_PATH="$(pwd)/.toolchains/emsdk"
          if [ "$RUNNER_OS" = "Windows" ]; then EMSDK_PATH="$(pwd -W)/.toolchains/emsdk"; fi
          echo "EMSDK=$EMSDK_PATH" >> "$GITHUB_ENV"
      - name: Configure native compiler cache (Ubuntu)
        if: runner.os == 'Linux'
        run: >-
          cmake -S templates/template -B templates/template/build/native-debug -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Configure native compiler cache (Windows)
        if: runner.os == 'Windows'
        run: >-
          cmake -S templates/template -B templates/template/build/native-debug -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Blocking Studio verification
        run: node ai_studio/studio.mjs verify --full
