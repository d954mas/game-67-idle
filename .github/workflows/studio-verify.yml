name: Studio verification

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  EMSDK_VERSION: '4.0.10'

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Bootstrap root Python environment (Ubuntu)
        if: runner.os == 'Linux'
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$pythonLocation/bin/python"
      - name: Bootstrap root Python environment (Windows)
        if: runner.os == 'Windows'
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$env:pythonLocation\python.exe"
      - name: Install deterministic Emscripten
        shell: bash
        run: |
          git clone --depth 1 --branch "$EMSDK_VERSION" https://github.com/emscripten-core/emsdk.git .toolchains/emsdk
          ./.toolchains/emsdk/emsdk install "$EMSDK_VERSION"
          ./.toolchains/emsdk/emsdk activate "$EMSDK_VERSION"
          EMSDK_PATH="$(pwd)/.toolchains/emsdk"
          if [ "$RUNNER_OS" = "Windows" ]; then EMSDK_PATH="$(pwd -W)/.toolchains/emsdk"; fi
          echo "EMSDK=$EMSDK_PATH" >> "$GITHUB_ENV"
      - name: Blocking Studio verification
        run: node ai_studio/studio.mjs verify --full
      - name: Advisory timing
        if: always()
        continue-on-error: true
        run: node ai_studio/dev_environment/toolchain_benchmark.mjs --game template --samples 1
