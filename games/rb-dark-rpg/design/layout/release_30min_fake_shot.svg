<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RB Dark RPG 30 Minute Release Fake Shot</title>
  <desc id="desc">A gameplay-oriented fake shot showing level, quest, enemy, gear tier, rewards, map context, and primary action for the 30-minute release balance.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252833"/>
      <stop offset="0.46" stop-color="#3b3540"/>
      <stop offset="1" stop-color="#1b1a20"/>
    </linearGradient>
    <linearGradient id="ash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#756251"/>
      <stop offset="0.45" stop-color="#3c3f46"/>
      <stop offset="1" stop-color="#17191f"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5e1f27"/>
      <stop offset="1" stop-color="#20171b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .ui { font-family: "Segoe UI", Arial, sans-serif; fill: #f4ead7; }
      .small { font-size: 24px; }
      .mid { font-size: 30px; font-weight: 650; }
      .big { font-size: 44px; font-weight: 750; }
      .muted { fill: #c9b99b; }
      .warn { fill: #f0b35b; }
      .danger { fill: #ff6f61; }
      .ok { fill: #7fd18b; }
      .panel { fill: rgba(24, 23, 28, 0.88); stroke: #6c5c48; stroke-width: 2; rx: 8; }
      .thin { stroke: #8f7c62; stroke-width: 2; fill: none; }
      .line { stroke: #c4975b; stroke-width: 4; stroke-linecap: round; fill: none; }
      .chip { fill: #3a3030; stroke: #87644b; stroke-width: 2; rx: 8; }
      .button { fill: #a7432f; stroke: #f0b35b; stroke-width: 3; rx: 8; }
      .nav { fill: #282833; stroke: #6c5c48; stroke-width: 2; rx: 8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 590 C210 520 312 615 500 560 C695 503 858 535 1040 510 C1270 478 1390 560 1600 500 L1600 900 L0 900 Z" fill="url(#ash)"/>
  <path d="M1120 150 L1204 455 L1030 455 Z" fill="#211d24"/>
  <path d="M1240 110 L1370 460 L1135 460 Z" fill="#2a2326"/>
  <path d="M985 230 L1070 458 L888 458 Z" fill="#30282a"/>
  <circle cx="1314" cy="166" r="38" fill="#b63c2e" opacity="0.72"/>
  <path d="M1290 166 L1340 166 M1314 142 L1314 190" stroke="#1a1618" stroke-width="10" stroke-linecap="round"/>

  <rect x="36" y="28" width="1528" height="92" class="panel" filter="url(#softShadow)"/>
  <text x="64" y="84" class="ui big">Level 8</text>
  <text x="245" y="84" class="ui mid muted">HP 72/72</text>
  <rect x="425" y="52" width="280" height="22" fill="#2d2b32" stroke="#756251" stroke-width="2" rx="8"/>
  <rect x="425" y="52" width="155" height="22" fill="#7fd18b" rx="8"/>
  <text x="425" y="101" class="ui small muted">XP 350 / 540 to Act I cap</text>
  <text x="760" y="84" class="ui mid warn">Gold 64</text>
  <text x="910" y="84" class="ui mid">Gear Tier T4</text>
  <text x="1190" y="84" class="ui mid danger">Threat: RISK</text>

  <rect x="44" y="150" width="430" height="610" class="panel" filter="url(#softShadow)"/>
  <text x="70" y="202" class="ui big">Ash Border</text>
  <text x="72" y="238" class="ui small muted">30-minute route and current beat</text>
  <path d="M120 645 C180 550 265 535 310 450 C365 345 315 280 420 235" class="line"/>
  <circle cx="120" cy="645" r="26" fill="#3d8d5f" stroke="#f4ead7" stroke-width="3"/>
  <circle cx="235" cy="535" r="24" fill="#9f7f4c" stroke="#f4ead7" stroke-width="3"/>
  <circle cx="310" cy="450" r="24" fill="#9f7f4c" stroke="#f4ead7" stroke-width="3"/>
  <circle cx="360" cy="330" r="24" fill="#9f7f4c" stroke="#f4ead7" stroke-width="3"/>
  <circle cx="420" cy="235" r="32" fill="#a7432f" stroke="#f0b35b" stroke-width="4"/>
  <text x="68" y="700" class="ui small">Last Post</text>
  <text x="250" y="582" class="ui small">Old Mill</text>
  <text x="336" y="383" class="ui small">Road</text>
  <text x="292" y="280" class="ui small warn">Black Sun Hideout</text>
  <rect x="72" y="272" width="170" height="42" class="chip"/>
  <text x="92" y="301" class="ui small">Minute 23-27</text>
  <rect x="72" y="332" width="220" height="42" class="chip"/>
  <text x="92" y="361" class="ui small">Quest q009 active</text>

  <rect x="508" y="150" width="560" height="610" class="panel" filter="url(#softShadow)"/>
  <text x="536" y="202" class="ui big">Encounter Preview</text>
  <text x="538" y="238" class="ui small muted">Autobattle, short readable result</text>
  <rect x="555" y="286" width="180" height="250" fill="#1f2028" stroke="#6c5c48" stroke-width="2" rx="8"/>
  <circle cx="645" cy="360" r="42" fill="#6d7f91"/>
  <rect x="600" y="404" width="90" height="112" fill="#435462" rx="8"/>
  <path d="M590 452 L520 500 M700 452 L760 505" stroke="#91a7b6" stroke-width="16" stroke-linecap="round"/>
  <text x="586" y="574" class="ui mid">Seeker</text>
  <text x="587" y="610" class="ui small muted">T4 Roadwarden kit</text>

  <rect x="835" y="286" width="180" height="250" fill="#21181c" stroke="#8f3c33" stroke-width="2" rx="8"/>
  <circle cx="925" cy="356" r="40" fill="#8f2f2c"/>
  <rect x="878" y="399" width="96" height="118" fill="#3a1e25" rx="8"/>
  <path d="M858 444 L808 492 M990 444 L1040 492" stroke="#bc5a48" stroke-width="16" stroke-linecap="round"/>
  <text x="849" y="574" class="ui mid">Acolyte</text>
  <text x="850" y="610" class="ui small muted">fast crit threat</text>

  <rect x="555" y="656" width="460" height="70" class="button"/>
  <text x="684" y="702" class="ui big">Start Fight</text>
  <rect x="555" y="635" width="180" height="8" fill="#7fd18b" rx="4"/>
  <rect x="835" y="635" width="180" height="8" fill="#ff6f61" rx="4"/>

  <rect x="1102" y="150" width="454" height="610" class="panel" filter="url(#softShadow)"/>
  <text x="1130" y="202" class="ui big">Quest</text>
  <text x="1132" y="238" class="ui mid warn">q009 Black Sun Hideout</text>
  <text x="1134" y="292" class="ui small ok">OK Bring the council seal</text>
  <text x="1134" y="334" class="ui small ok">OK Unlock the hideout gate</text>
  <text x="1134" y="376" class="ui small">&gt; Defeat the acolyte</text>
  <text x="1134" y="418" class="ui small muted">Next: find the relic key</text>

  <rect x="1130" y="468" width="386" height="112" fill="#26232b" stroke="#756251" stroke-width="2" rx="8"/>
  <text x="1152" y="510" class="ui mid">Reward Preview</text>
  <circle cx="1172" cy="550" r="16" fill="#f0b35b"/>
  <text x="1200" y="560" class="ui small">18 gold</text>
  <rect x="1310" y="530" width="34" height="34" fill="#934038" stroke="#f4ead7" stroke-width="2" rx="6"/>
  <text x="1358" y="560" class="ui small">hideout key</text>

  <text x="1130" y="632" class="ui mid">Gear Ladder</text>
  <g transform="translate(1130 656)">
    <rect x="0" y="0" width="68" height="42" class="chip"/>
    <text x="18" y="29" class="ui small muted">T1</text>
    <rect x="78" y="0" width="68" height="42" class="chip"/>
    <text x="96" y="29" class="ui small muted">T2</text>
    <rect x="156" y="0" width="68" height="42" class="chip"/>
    <text x="174" y="29" class="ui small muted">T3</text>
    <rect x="234" y="0" width="68" height="42" fill="#3d6f52" stroke="#7fd18b" stroke-width="3" rx="8"/>
    <text x="252" y="29" class="ui small">T4</text>
    <rect x="312" y="0" width="68" height="42" fill="#3a3030" stroke="#f0b35b" stroke-width="2" rx="8"/>
    <text x="330" y="29" class="ui small warn">T5</text>
  </g>

  <rect x="36" y="790" width="1528" height="82" class="panel" filter="url(#softShadow)"/>
  <g transform="translate(96 806)">
    <rect x="0" y="0" width="180" height="48" class="nav"/>
    <text x="60" y="32" class="ui small">Place</text>
    <rect x="220" y="0" width="180" height="48" class="nav"/>
    <text x="280" y="32" class="ui small">Map</text>
    <rect x="440" y="0" width="180" height="48" fill="#3d6f52" stroke="#7fd18b" stroke-width="3" rx="8"/>
    <text x="488" y="32" class="ui small">Journal</text>
    <rect x="660" y="0" width="180" height="48" class="nav"/>
    <text x="704" y="32" class="ui small">Gear</text>
    <rect x="880" y="0" width="180" height="48" class="nav"/>
    <text x="936" y="32" class="ui small">More</text>
    <rect x="1120" y="0" width="280" height="48" class="button"/>
    <text x="1178" y="32" class="ui small">Track Objective</text>
  </g>
</svg>
