<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700">
  <defs>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050403" stop-opacity="0.9"/>
      <stop offset="0.68" stop-color="#050403" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#050403" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#050403" stop-opacity="0.92"/>
      <stop offset="0.72" stop-color="#050403" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#050403" stop-opacity="0"/>
    </linearGradient>
    <style>
      .screen { fill: none; stroke: #d5a85f; stroke-width: 2; stroke-dasharray: 10 8; }
      .guide { fill: none; stroke: #6f5832; stroke-width: 1; stroke-dasharray: 5 6; }
      .label { font-family: Georgia, 'Times New Roman', serif; fill: #e8d2a5; font-size: 24px; }
      .small { font-family: Arial, sans-serif; fill: #c9b38b; font-size: 14px; }
      .tiny { font-family: Arial, sans-serif; fill: #9f8a68; font-size: 12px; }
      .box { fill: rgba(20, 15, 10, 0.72); stroke: #8e6a38; stroke-width: 1.5; rx: 4; }
      .button { fill: rgba(24, 18, 12, 0.78); stroke: #7b5d33; stroke-width: 1.2; rx: 5; }
      .locked { fill: rgba(18, 16, 14, 0.62); stroke: #4f4437; stroke-width: 1.2; rx: 5; }
      .hp { fill: #7a211d; }
      .xp { fill: #6d4b9a; }
      .gold { fill: #d69a38; }
    </style>
  </defs>

  <rect width="1280" height="700" fill="#15120e"/>
  <rect x="160" y="80" width="960" height="540" fill="#1a1815" opacity="0.35"/>
  <rect x="160" y="80" width="960" height="540" class="screen"/>

  <rect x="0" y="0" width="1280" height="126" fill="url(#topFade)"/>
  <rect x="0" y="574" width="1280" height="126" fill="url(#bottomFade)"/>

  <rect x="160" y="80" width="112" height="72" class="guide"/>
  <text x="174" y="112" class="tiny">Poki reserve</text>
  <text x="174" y="132" class="tiny">no game state</text>

  <rect x="470" y="92" width="340" height="46" class="box"/>
  <text x="640" y="122" text-anchor="middle" class="label">Последний Пост</text>
  <text x="640" y="147" text-anchor="middle" class="tiny">location context in top fade</text>

  <rect x="765" y="92" width="330" height="58" class="box"/>
  <rect x="778" y="101" width="40" height="40" fill="#2a2118" stroke="#9c7440" stroke-width="1.4"/>
  <text x="828" y="113" class="small">Наемник</text>
  <text x="895" y="113" class="tiny">Ур. 1</text>
  <rect x="828" y="122" width="180" height="11" fill="#241813" stroke="#68422f" stroke-width="1"/>
  <rect x="829" y="123" width="142" height="9" class="hp"/>
  <text x="1016" y="132" class="tiny">24/24</text>
  <rect x="828" y="138" width="180" height="6" fill="#211929" stroke="#4e3b68" stroke-width="0.8"/>
  <rect x="829" y="139" width="22" height="4" class="xp"/>
  <text x="1016" y="145" class="tiny">0/20 XP</text>

  <rect x="888" y="154" width="205" height="34" class="box"/>
  <circle cx="908" cy="171" r="9" class="gold"/>
  <text x="924" y="176" class="small">125</text>
  <text x="972" y="176" class="small">припасы</text>
  <text x="1054" y="176" class="small">⚙</text>

  <rect x="420" y="586" width="96" height="54" class="locked"/>
  <rect x="528" y="586" width="96" height="54" class="button"/>
  <rect x="636" y="586" width="112" height="54" class="locked"/>
  <rect x="760" y="586" width="96" height="54" class="locked"/>
  <rect x="868" y="586" width="118" height="54" class="locked"/>
  <text x="468" y="618" text-anchor="middle" class="small">Карта</text>
  <text x="576" y="618" text-anchor="middle" class="small">Квесты</text>
  <text x="692" y="618" text-anchor="middle" class="small">Снаряжение</text>
  <text x="808" y="618" text-anchor="middle" class="small">Улики</text>
  <text x="927" y="618" text-anchor="middle" class="small">Репутация</text>
  <text x="576" y="577" text-anchor="middle" class="tiny">small active quest marker, not CTA</text>

  <rect x="580" y="300" width="80" height="120" fill="rgba(120, 82, 44, 0.18)" stroke="#d4a153" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="620" cy="286" r="16" fill="rgba(212, 161, 83, 0.22)" stroke="#d4a153" stroke-width="2"/>
  <text x="620" y="292" text-anchor="middle" class="label">!</text>
  <text x="620" y="444" text-anchor="middle" class="small">Страж у ворот</text>
  <text x="620" y="464" text-anchor="middle" class="tiny">first click target in scene</text>

  <line x1="160" y1="152" x2="1120" y2="152" class="guide"/>
  <line x1="160" y1="508" x2="1120" y2="508" class="guide"/>
  <text x="170" y="170" class="tiny">top UI zone fades into scene</text>
  <text x="170" y="500" class="tiny">bottom nav zone fades into scene</text>
</svg>
