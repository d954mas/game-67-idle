<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game 67 GDD Editor</title>
    <link rel="stylesheet" href="site.css">
  </head>
  <body class="editor-page">
    <main class="editor-shell">
      <header class="editor-head">
        <div>
          <p class="eyebrow">Game 67</p>
          <h1>GDD Editor</h1>
        </div>
        <nav class="editor-links" aria-label="Навигация">
          <a href="/">GDD</a>
          <a href="/editor.html">Editor</a>
        </nav>
      </header>

      <section class="editor-panel">
        <div class="editor-toolbar">
          <label>
            Файл
            <select id="fileSelect"></select>
          </label>
          <button id="saveButton" type="button">Сохранить</button>
          <span id="saveStatus" role="status"></span>
        </div>
        <textarea id="fileContent" spellcheck="false"></textarea>
      </section>
    </main>
    <script src="editor.js"></script>
  </body>
</html>
