<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taskboard</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/ai_studio/studio_shell/studio_shell.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="studio-shell">
    <aside class="studio-sidebar" aria-label="AI Studio navigation">
      <div class="studio-sidebar-brand">
        <span class="studio-brand-mark">AI</span>
        <div class="studio-brand-copy">
          <strong>AI Studio</strong>
          <span>game pipeline</span>
        </div>
        <button class="studio-sidebar-toggle" type="button" data-studio-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">&lt;</button>
      </div>

      <nav class="studio-side-nav" aria-label="Primary">
        <p class="studio-nav-section">Workspace</p>
        <a class="studio-nav-item" href="/">
          <span class="studio-nav-icon">S</span>
          <span class="studio-nav-label">Studio Home</span>
        </a>
        <a class="studio-nav-item" href="/architecture_map/">
          <span class="studio-nav-icon map">M</span>
          <span class="studio-nav-label">Architecture Map</span>
        </a>
        <a class="studio-nav-item is-active" href="/taskboard/">
          <span class="studio-nav-icon tasks">T</span>
          <span class="studio-nav-label">Taskboard</span>
        </a>
        <a class="studio-nav-item" href="/viewer/">
          <span class="studio-nav-icon assets">A</span>
          <span class="studio-nav-label">Asset Viewer</span>
        </a>
        <a class="studio-nav-item" href="/quality/">
          <span class="studio-nav-icon quality">Q</span>
          <span class="studio-nav-label">Quality Checks</span>
        </a>

      </nav>
    </aside>

    <main class="studio-content taskboard-content">
      <header class="topbar">
        <div class="title-block">
          <h1>Taskboard</h1>
          <span id="boardStatus" class="board-status"></span>
        </div>
        <div class="view-tabs" role="tablist" aria-label="Taskboard views">
          <button type="button" class="view-tab is-active" data-view="board" role="tab" aria-selected="true">Board</button>
          <button type="button" class="view-tab" data-view="projects" role="tab" aria-selected="false">Projects</button>
          <button type="button" class="view-tab" data-view="epics" role="tab" aria-selected="false">Epics</button>
        </div>
        <input id="search" type="search" placeholder="Search title, id, tag...">
        <select id="projectFilter"><option value="">All projects</option></select>
        <select id="epicFilter"><option value="">All epics</option></select>
        <label class="toggle"><input type="checkbox" id="showClosed"> all statuses</label>
        <span class="spacer"></span>
        <button id="newProject" class="ghost">+ Project</button>
        <button id="newEpic" class="ghost">+ Epic</button>
        <button id="newTask" class="primary">+ Task</button>
      </header>

      <section id="overview" class="overview" aria-label="Taskboard overview"></section>
      <section id="board" class="board"></section>
    </main>
  </div>

  <dialog id="editor">
    <form id="editorForm" method="dialog">
      <div class="editor-head">
        <span id="editorId" class="doc-id"></span>
        <input id="fTitle" name="title" placeholder="Title" required autocomplete="off">
      </div>
      <div class="editor-fields">
        <label>Status <select id="fStatus" name="status"></select></label>
        <label>Priority <select id="fPriority" name="priority"></select></label>
        <label id="projectFieldWrap">Project <select id="fProject" name="project"></select></label>
        <label id="epicFieldWrap">Epic <select id="fEpic" name="epic"></select></label>
        <label id="projectKindFieldWrap">Kind <select id="fProjectKind" name="kind"></select></label>
        <label id="targetFieldWrap">Target <input id="fTarget" name="target" placeholder="ai_studio or games/id" autocomplete="off"></label>
        <label class="grow">Tags <input id="fTags" name="tags" placeholder="comma, separated" autocomplete="off"></label>
      </div>
      <div class="body-editor">
        <textarea id="fBody" name="body" spellcheck="false"></textarea>
        <div id="bodyPreview" class="markdown-preview" aria-label="Markdown preview"></div>
      </div>
      <div class="editor-foot">
        <span id="editorMeta" class="meta"></span>
        <span class="spacer"></span>
        <button type="button" id="editorCancel" class="ghost">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="markdown_preview.js"></script>
  <script src="app.js"></script>
  <script src="/ai_studio/studio_shell/studio_shell.js"></script>
</body>
</html>
