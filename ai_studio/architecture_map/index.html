<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Studio Architecture Map</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/ai_studio/studio_shell/studio_shell.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f5f8;
      --panel: #ffffff;
      --soft: #f8fafc;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e1ee;
      --shadow: 0 14px 34px rgba(23, 32, 51, .10);
      --danger: #b91c1c;
      --warn: #b45309;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: .94em; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 28px; line-height: 1.08; letter-spacing: 0; }
    h2 { font-size: 18px; line-height: 1.2; letter-spacing: 0; }
    h3 { font-size: 14px; line-height: 1.2; letter-spacing: 0; }
    .shell { width: min(1760px, calc(100% - 24px)); margin: 0 auto; padding: 12px 0 22px; }
    header { display: grid; gap: 12px; margin-bottom: 12px; }
    .lead { color: var(--muted); max-width: 1120px; font-size: 15px; }
    .navline { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .navline a, .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 25px;
      border: 1px solid #dce5f3;
      border-radius: 999px;
      background: #fff;
      padding: 3px 9px;
      color: #334155;
      font-size: 12px;
      white-space: nowrap;
    }
    input, select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }
    button { cursor: pointer; background: #1f2937; color: #fff; border-color: #1f2937; }
    button.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 14px; align-items: start; }
    .graph-only-layout { min-height: calc(100vh - 24px); }
    .graph-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .graph-card { overflow: hidden; }
    .graph-titlebar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: start;
      width: 100%;
    }
    .graph-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .graph-head h1 {
      font-size: 20px;
      line-height: 1.12;
    }
    .metrics, .legend, .actions { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .metric {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 4px 8px;
      font-size: 12px;
    }
    .metric b { color: var(--ink); font-size: 14px; }
    .swatch { width: 11px; height: 11px; border-radius: 3px; background: var(--c); flex: 0 0 auto; }
    .icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--c);
      background: color-mix(in srgb, var(--c) 10%, #fff);
      border: 1px solid color-mix(in srgb, var(--c) 34%, #dbe4f0);
      flex: 0 0 auto;
    }
    .icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .block { display: grid; gap: 7px; }
    .muted { color: var(--muted); font-size: 12px; }
    .type-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 760px;
    }
    .type-chip {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      border: 1px solid color-mix(in srgb, var(--c) 34%, #dce5f3);
      border-radius: 999px;
      background: color-mix(in srgb, var(--c) 8%, #fff);
      color: #334155;
      cursor: pointer;
      font-family: inherit;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 650;
      white-space: nowrap;
    }
    .type-chip:hover,
    .type-chip:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 62%, #64748b);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 14%, transparent);
    }
    .type-chip.is-muted {
      background: #fff;
      color: #94a3b8;
      opacity: .56;
    }
    .type-chip .swatch {
      width: 10px;
      height: 10px;
    }
    .type-chip.is-muted .swatch {
      opacity: .36;
    }
    .chip.ok { color: var(--ok); background: #edf9f0; border-color: #b8e4c2; }
    .chip.warn { color: var(--warn); background: #fff7e9; border-color: #efd1a0; }
    .chip.bad { color: var(--danger); background: #fff0f0; border-color: #efbdbd; }
    .chip.info { color: #2563eb; background: #eef4ff; border-color: #c9dcff; }
    .boot-error {
      display: none;
      margin: 10px 14px;
      border: 1px solid #efbdbd;
      border-radius: 8px;
      background: #fff0f0;
      color: #8f1515;
      padding: 10px 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .viewport {
      position: relative;
      height: calc(100vh - 186px);
      min-height: 620px;
      overflow: auto;
      cursor: default;
      touch-action: auto;
      user-select: text;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
    }
    .drill-layer {
      display: block;
      position: absolute;
      inset: 0;
      min-height: 100%;
      padding: 14px;
      overflow: auto;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .14) 1px, transparent 0) 0 0 / 22px 22px,
        linear-gradient(180deg, #ffffff 0%, #f4f8fc 100%);
    }
    .drill-empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      padding: 12px;
    }
    .graph-tree-board {
      min-height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .14) 1px, transparent 0) 0 0 / 22px 22px,
        linear-gradient(180deg, #ffffff 0%, #f4f8fc 100%);
      padding: 14px;
      overflow: auto;
    }
    .drill-layer.graph-tree-board {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 14px;
      overflow: hidden;
    }
    .drill-graph-shell {
      display: grid;
      gap: 10px;
      min-height: 100%;
    }
    .drill-graph-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      min-height: calc(100% - 58px);
    }
    .drill-graph-viewport {
      position: relative;
      min-height: 720px;
      overflow: hidden;
      border-radius: 8px;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
      cursor: grab;
      touch-action: none;
    }
    .drill-graph-viewport.panning {
      cursor: grabbing;
    }
    .drill-graph-pan {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .drill-hierarchy-panel {
      position: sticky;
      top: 58px;
      align-self: start;
      max-height: calc(100vh - 260px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 8px 20px rgba(15, 23, 42, .08);
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .hierarchy-list {
      display: grid;
      gap: 5px;
    }
    .hierarchy-node {
      min-height: 34px;
      width: 100%;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      border: 1px solid #dce5f3;
      border-left: 4px solid var(--c);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 5px 7px;
      text-align: left;
    }
    .hierarchy-node.current {
      border-color: #111827;
      background: color-mix(in srgb, var(--c) 7%, #fff);
    }
    .hierarchy-node.leaf {
      cursor: default;
      background: #f8fafc;
    }
    .hierarchy-node span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hierarchy-node.depth-1 { margin-left: 10px; width: calc(100% - 10px); }
    .hierarchy-node.depth-2 { margin-left: 20px; width: calc(100% - 20px); }
    .hierarchy-node.depth-3 { margin-left: 30px; width: calc(100% - 30px); }
    .hierarchy-children {
      display: grid;
      gap: 5px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .drill-graph-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 12;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      padding: 10px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .08);
    }
    .drill-toolbar-meta {
      display: grid;
      justify-items: end;
      gap: 6px;
    }
    .drill-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .drill-toolbar-actions button {
      width: auto;
    }
    .drill-graph-canvas {
      position: relative;
      min-height: 720px;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
    }
    .drill-graph-node {
      position: absolute;
      width: 260px;
      height: auto;
      min-height: 118px;
      transform: translate3d(-50%, -50%, 0);
      border: 1px solid color-mix(in srgb, var(--c) 42%, #cbd5e1);
      border-top: 4px solid var(--c);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 10px 25px rgba(15, 23, 42, .10);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 6px;
      padding: 12px;
      text-align: left;
      z-index: 2;
    }
    .drill-graph-node.leaf {
      border-top-style: solid;
      background: rgba(248, 250, 252, .96);
      cursor: default;
    }
    .drill-graph-node:hover, .drill-graph-node:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 65%, #64748b);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 13%, transparent), 0 14px 30px rgba(15, 23, 42, .14);
      transform: translate3d(-50%, -50%, 0) translateY(-1px);
    }
    .drill-node-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .drill-node-title {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      min-width: 0;
      width: 100%;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.18;
    }
    .drill-node-title .icon { flex: 0 0 auto; }
    .drill-graph-node.title-fit-sm .drill-node-title { font-size: 13px; }
    .drill-graph-node.title-fit-xs .drill-node-title { font-size: 12px; }
    .drill-graph-node.title-fit-xxs .drill-node-title { font-size: 11px; }
    .drill-node-title span:last-child {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
      text-overflow: clip;
      white-space: normal;
    }
    .drill-node-desc {
      color: #465569;
      font-size: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .drill-node-subtitle {
      color: #64748b;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .drill-node-path {
      border: 1px solid #dbe5f1;
      border-radius: 6px;
      background: #fff;
      color: #334155;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      overflow: hidden;
      padding: 5px 6px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .drill-node-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .drill-node-action {
      align-items: center;
      background: #111827;
      border: 1px solid #111827;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-size: 11px;
      font-weight: 700;
      justify-content: center;
      min-height: 28px;
      padding: 5px 7px;
      text-decoration: none;
    }
    .drill-node-action.secondary {
      background: #fff;
      color: #334155;
      border-color: #cbd5e1;
    }
    .drill-node-action:hover, .drill-node-action:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 55%, #111827);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 16%, transparent);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-top: 1px solid var(--line); padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: #f2f5fb; color: var(--muted); font-size: 12px; font-weight: 600; }
    @media (max-width: 1160px) {
      .layout { grid-template-columns: 1fr; }
      .graph-titlebar { grid-template-columns: 1fr; }
      .type-legend { justify-content: flex-start; max-width: none; }
      .drill-graph-layout { grid-template-columns: 1fr; }
      .drill-graph-viewport { order: -1; }
      .drill-hierarchy-panel { position: static; max-height: none; }
      .viewport { height: 68vh; }
    }
    @media (max-width: 720px) {
      .shell { width: min(100% - 18px, 1620px); }
      input, select, button { width: 100%; }
      .viewport { min-height: 560px; }
      table, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }
      tr { border-top: 1px solid var(--line); padding: 7px 0; }
      td { border-top: 0; padding: 6px 10px; }
    }
    @media (max-width: 860px) {
      .studio-sidebar {
        gap: 8px;
        padding: 8px 10px;
      }
      .studio-sidebar-brand {
        padding-bottom: 8px;
      }
      .studio-side-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .studio-nav-section,
      .studio-nav-label {
        display: none;
      }
      .studio-nav-item {
        grid-template-columns: 24px;
        justify-content: center;
        min-height: 32px;
        padding: 4px;
      }
      .architecture-map-content .shell {
        width: min(100% - 12px, 1760px);
        padding-top: 6px;
      }
      .graph-head {
        gap: 6px;
        padding: 8px;
      }
      .graph-head h1 {
        font-size: 18px;
      }
      .graph-head .muted {
        font-size: 12px;
      }
      .type-legend {
        display: flex;
        flex-wrap: nowrap;
        justify-content: flex-start;
        max-width: 100%;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: thin;
      }
      .type-chip {
        flex: 0 0 auto;
        min-height: 30px;
        width: auto;
      }
      .drill-toolbar-actions button {
        width: auto;
        height: 32px;
        min-height: 32px;
      }
      .viewport {
        height: calc(100dvh - 250px);
        min-height: 480px;
      }
      .drill-layer {
        padding: 10px;
      }
      .drill-graph-toolbar {
        gap: 6px;
        padding: 8px;
      }
      .drill-graph-toolbar h2 {
        font-size: 15px;
      }
      .drill-graph-toolbar .legend {
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="studio-shell">
    <aside class="studio-sidebar" aria-label="AI Studio navigation">
      <div class="studio-sidebar-brand">
        <span class="studio-brand-mark">AI</span>
        <div class="studio-brand-copy">
          <strong>AI Studio</strong>
          <span>game pipeline</span>
        </div>
        <button class="studio-sidebar-toggle" type="button" data-studio-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">&lt;</button>
      </div>

      <nav class="studio-side-nav" aria-label="Primary">
        <p class="studio-nav-section">Workspace</p>
        <a class="studio-nav-item" href="/">
          <span class="studio-nav-icon">S</span>
          <span class="studio-nav-label">Studio Home</span>
        </a>
        <a class="studio-nav-item is-active" href="/architecture_map/">
          <span class="studio-nav-icon map">M</span>
          <span class="studio-nav-label">Architecture Map</span>
        </a>
        <a class="studio-nav-item" href="/taskboard/">
          <span class="studio-nav-icon tasks">T</span>
          <span class="studio-nav-label">Taskboard</span>
        </a>
        <a class="studio-nav-item" href="/asset_viewer/">
          <span class="studio-nav-icon assets">A</span>
          <span class="studio-nav-label">Asset Viewer</span>
        </a>
        <a class="studio-nav-item" href="/canvas">
          <span class="studio-nav-icon prep">C</span>
          <span class="studio-nav-label">Canvas</span>
        </a>
        <a class="studio-nav-item" href="/quality/">
          <span class="studio-nav-icon quality">Q</span>
          <span class="studio-nav-label">Quality Checks</span>
        </a>

      </nav>
    </aside>

    <main class="studio-content architecture-map-content">
      <div class="shell">
      <div class="layout graph-only-layout">
        <section class="graph-card" aria-labelledby="graphTitle">
        <div class="graph-head">
          <div class="graph-titlebar">
            <div>
              <h1 id="graphTitle">AI Studio Architecture Map</h1>
              <p class="muted">Live ownership tree from <code>ai_studio/tree.json</code>.</p>
            </div>
            <div class="type-legend" id="typeLegend" aria-label="Node type color legend"></div>
          </div>
        </div>
        <div class="boot-error" id="bootError"></div>
        <div class="viewport" id="viewport">
          <div id="studioExplorerTree" class="drill-layer graph-tree-board" aria-label="Nested module tree"></div>
        </div>
        </section>
      </div>
    </main>
  </div>

  
  <script>
  (async () => {
    const data = { studioTree: null, validationReport: null };
    async function fetchJson(path) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) return null;
        return await response.json();
      } catch (error) {
        return null;
      }
    }
    function repoHref(path) {
      return path ? "../../" + String(path).replace(/^\/+/, "") : "";
    }
    function defaultTitle(node) {
      if (node.title) return node.title;
      if (node.path) return String(node.path).split(/[\\/]/).pop();
      return node.id || "Untitled";
    }
    const kindPalette = {
      root: { label: "Root", color: "#334155" },
      module: { label: "Module", color: "#2563eb" },
      workspace: { label: "Workspace", color: "#7c3aed" },
      group: { label: "Group", color: "#64748b" },
      boundary: { label: "Boundary", color: "#0d9488" }
    };
    const typeLegendItems = ["module", "workspace", "group", "boundary"];
    const defaultHiddenKinds = new Set();
    function normalizedKind(kind) {
      const value = String(kind || "module").toLowerCase();
      if (kindPalette[value]) return value;
      return "module";
    }
    function kindMeta(kind) {
      return kindPalette[normalizedKind(kind)] || kindPalette.module;
    }
    function kindLabel(kind) {
      return kindMeta(kind).label;
    }
    function kindColor(kind) {
      return kindMeta(kind).color;
    }
    function normalizeStudioTreeNode(node) {
      const rawChildren = node.children || [];
      const kind = node.kind || "module";
      const normalized = {
        id: node.id,
        title: defaultTitle(node),
        subtitle: node.path || node.entry || "",
        kind,
        color: kindColor(kind),
        description: node.description || "",
        path: node.path || "",
        entry: node.entry || "",
        contract: node.contract || "",
        store: node.store || "",
        boundary: node.boundary || "",
        owner: node.owner || "",
        verifyDomain: node.verifyDomain || "",
        href: repoHref(node.entry || node.path),
        children: rawChildren.map(normalizeStudioTreeNode)
      };
      return normalized;

      if (Math.abs(event.clientX - drillPanning.clientX) > 4 || Math.abs(event.clientY - drillPanning.clientY) > 4) drillPanning.moved = true;
      drillPanX = drillPanning.panX + event.clientX - drillPanning.clientX;
      drillPanY = drillPanning.panY + event.clientY - drillPanning.clientY;
      applyDrillTransform();
    });
    window.addEventListener("pointerup", () => {
      if (drillDragging && drillDragging.moved) {
        suppressExplorerClick = true;
        window.setTimeout(() => { suppressExplorerClick = false; }, 250);
        writeSavedLayout();
      }
      drillDragging = null;
      if (drillPanning) {
        const board = studioExplorerTree.querySelector(".drill-graph-viewport.panning");
        if (board) board.classList.remove("panning");
      }
      drillPanning = null;
    });

    if (studioExplorerTree) {
      studioExplorerTree.addEventListener("pointerdown", (event) => {
        const node = event.target.closest(".drill-graph-node");
        if (node && event.button === 0) {
          const interactive = event.target.closest("a,button,input,select,textarea");
          if (interactive && !interactive.classList.contains("drill-graph-node")) return;
          event.preventDefault();
          event.stopPropagation();
          const canvas = node.closest(".drill-graph-canvas");
          if (!canvas) return;
          const pointer = drillCanvasPoint(event, canvas);
          const x = parseFloat(node.style.left) || 0;
          const y = parseFloat(node.style.top) || 0;
          drillDragging = {
            id: node.dataset.drillId,
            viewId: explorerView,
            el: node,
            canvas,
            dx: pointer.x - x,
            dy: pointer.y - y,
            clientX: event.clientX,
            clientY: event.clientY,
            moved: false
          };
          node.setPointerCapture(event.pointerId);
          return;
        }
        if (event.button !== 0) return;
        const interactive = event.target.closest("a,button,input,select,textarea");
        if (interactive) return;
        const board = event.target.closest(".drill-graph-viewport");
        if (!board) return;
        event.preventDefault();
        drillPanning = {
          clientX: event.clientX,
          clientY: event.clientY,
          panX: drillPanX,
          panY: drillPanY,
          moved: false
        };
        board.classList.add("panning");
        board.setPointerCapture(event.pointerId);
      });
      studioExplorerTree.addEventListener("wheel", (event) => {
        const board = event.target.closest(".drill-graph-viewport");
        if (!board) return;
        if (event.target.closest(".drill-node-desc")) return;
        event.preventDefault();
        const factor = Math.exp(-event.deltaY * 0.0012);
        setDrillZoomAt(event.clientX, event.clientY, drillZoom * factor);
      }, { passive: false });
    }
    if (studioExplorerTree) {
      studioExplorerTree.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest("[data-explorer-card]");
        if (!card || !studioExplorerTree.contains(card)) return;
        if (event.target.closest("[data-copy-path],a,button")) return;
        event.preventDefault();
        activateExplorerNode(card.dataset.explorerCard);
      });
      studioExplorerTree.addEventListener("click", (event) => {
        if (suppressExplorerClick) {
          event.preventDefault();
          event.stopPropagation();
          suppressExplorerClick = false;
          return;
        }
        const back = event.target.closest("[data-explorer-back]");
        if (back) {
          event.preventDefault();
          event.stopPropagation();
          explorerBack();
          return;
        }
        const copy = event.target.closest("[data-copy-path]");
        if (copy) {
          event.preventDefault();
          event.stopPropagation();
          copyText(copy.dataset.copyPath, copy);
          return;
        }
        const card = event.target.closest("[data-explorer-card]");
        if (!card) return;
        event.preventDefault();
        activateExplorerNode(card.dataset.explorerCard);
      });
    }
    function renderValidationPanel() {
      const report = data.validationReport;
      if (!report) return;
      if (!document.getElementById("mapValidationStyles")) {
        const style = document.createElement("style");
        style.id = "mapValidationStyles";
        style.textContent = `
          .map-validation-panel {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 50;
            width: min(460px, calc(100vw - 32px));
            max-height: min(560px, calc(100vh - 32px));
            overflow: auto;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.96);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
            color: #e5e7eb;
          }
          .map-validation-panel summary {
            cursor: pointer;
            list-style-position: inside;
          }
          .map-validation-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 700;
          }
          .map-validation-body {
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding: 10px 12px 12px;
          }
          .map-validation-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
          }
          .map-validation-stat {
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 8px;
            padding: 8px;
            background: rgba(30, 41, 59, 0.75);
          }
          .map-validation-stat b {
            display: block;
            font-size: 18px;
            line-height: 1.1;
          }
          .map-validation-stat span {
            color: #cbd5e1;
            font-size: 11px;
          }
          .map-validation-category {
            border-top: 1px solid rgba(148, 163, 184, 0.16);
            padding: 8px 0;
          }
          .map-validation-category summary {
            font-size: 12px;
            font-weight: 700;
            color: #dbeafe;
          }
          .map-validation-paths {
            display: grid;
            gap: 4px;
            margin-top: 8px;
          }
          .map-validation-paths a,
          .map-validation-paths span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border-radius: 6px;
            padding: 5px 7px;
            background: rgba(15, 23, 42, 0.76);
            color: #e5e7eb;
            font-size: 11px;
            text-decoration: none;
          }
          .map-validation-paths a:hover {
            background: rgba(37, 99, 235, 0.28);
          }
          .map-validation-note {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 8px;
          }
        `;
        document.head.appendChild(style);
      }
      const summary = report.summary || {};
      const issues = report.issues || {};
      const issueCount =
        (summary.missingInRepo || 0) +
        (summary.duplicateMappings || 0) +
        (summary.unmappedInAiStudio || 0) +
        (summary.unmappedOutsideAiStudio || 0) +
        (summary.missingDescriptions || 0);
      const categories = [
        ["unmappedInAiStudio", "Unmapped in ai_studio"],
        ["unmappedOutsideAiStudio", "Unmapped outside ai_studio"],
        ["missingInRepo", "Mapped but missing in repo"],
        ["duplicateMappings", "Duplicate mappings"],
        ["missingDescriptions", "Missing descriptions"]
      ];
      function pathOf(item) {
        return item && (item.path || item.id || item.mapping || JSON.stringify(item));
      }
      function countText(value) {
        return esc(String(value == null ? 0 : value));
      }
      function renderCategory(key, title) {
        const items = issues[key] || [];
        if (!items.length) return "";
        const limit = 120;
        const rows = items.slice(0, limit).map((item) => {
          const path = pathOf(item);
          return path
            ? '<a href="' + esc(repoHref(path)) + '" title="' + esc(path) + '">' + esc(path) + '</a>'
            : '<span>' + esc(JSON.stringify(item)) + '</span>';
        }).join("");
        const rest = items.length > limit ? '<p class="map-validation-note">Showing ' + limit + ' of ' + items.length + ' paths.</p>' : "";
        return '<details class="map-validation-category">' +
          '<summary>' + esc(title) + ': ' + items.length + '</summary>' +
          '<div class="map-validation-paths">' + rows + '</div>' + rest +
        '</details>';
      }
      const host = document.getElementById("mapValidationPanel") || document.createElement("details");
      host.id = "mapValidationPanel";
      host.className = "map-validation-panel";
      host.innerHTML =
        '<summary class="map-validation-summary"><span>Map validation</span><span>' + issueCount + ' issues</span></summary>' +
        '<div class="map-validation-body">' +
          '<div class="map-validation-stats">' +
            '<div class="map-validation-stat"><b>' + countText(summary.mappedPaths) + '</b><span>mapped paths</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.scannedPaths) + '</b><span>scanned paths</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.unmappedInAiStudio) + '</b><span>unmapped ai_studio</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.unmappedOutsideAiStudio) + '</b><span>unmapped outside</span></div>' +
          '</div>' +
          categories.map((entry) => renderCategory(entry[0], entry[1])).join("") +
          '<p class="map-validation-note">Source: <a href="/api/architecture-validation">/api/architecture-validation</a> (live). Scanner only audits; tree ownership stays in ai_studio/tree.json.</p>' +
        '</div>';
      if (!host.parentNode) document.body.appendChild(host);
    }
    function updateAll() {
      renderExplorer();
    }
    document.getElementById("typeLegend").addEventListener("click", (event) => {
      const button = event.target.closest("[data-kind-toggle]");
      if (!button) return;
      event.preventDefault();
      applyKindVisibility(button.dataset.kindToggle, hiddenKinds.has(button.dataset.kindToggle));
    });
    try {
      restoreSavedLayout();
      renderLegend();
      renderValidationPanel();
      updateAll();
    } catch (error) {
      const bootError = document.getElementById("bootError");
      if (bootError) {
        bootError.style.display = "block";
        bootError.textContent = "Architecture map failed to initialize: " + (error && error.message ? error.message : String(error));
      }
      throw error;
    }
  })();
  </script>
  <script src="/ai_studio/studio_shell/studio_shell.js"></script>
</body>
</html>
