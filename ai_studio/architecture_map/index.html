<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Pipeline Core Refactor Map</title>
  <link rel="stylesheet" href="/ai_studio/studio_shell/studio_shell.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f5f8;
      --panel: #ffffff;
      --soft: #f8fafc;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e1ee;
      --shadow: 0 14px 34px rgba(23, 32, 51, .10);
      --danger: #b91c1c;
      --warn: #b45309;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: .94em; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 28px; line-height: 1.08; letter-spacing: 0; }
    h2 { font-size: 18px; line-height: 1.2; letter-spacing: 0; }
    h3 { font-size: 14px; line-height: 1.2; letter-spacing: 0; }
    .shell { width: min(1760px, calc(100% - 24px)); margin: 0 auto; padding: 12px 0 22px; }
    header { display: grid; gap: 12px; margin-bottom: 12px; }
    .lead { color: var(--muted); max-width: 1120px; font-size: 15px; }
    .navline { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .navline a, .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 25px;
      border: 1px solid #dce5f3;
      border-radius: 999px;
      background: #fff;
      padding: 3px 9px;
      color: #334155;
      font-size: 12px;
      white-space: nowrap;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 8px;
      z-index: 20;
    }
    input, select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }
    input { flex: 1 1 300px; min-width: 240px; }
    button { cursor: pointer; background: #1f2937; color: #fff; border-color: #1f2937; }
    button.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
    .toggle-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #334155;
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }
    .toggle-control input {
      width: 15px;
      min-width: 15px;
      height: 15px;
      flex: 0 0 auto;
      padding: 0;
      margin: 0;
    }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 14px; align-items: start; }
    .graph-only-layout { min-height: calc(100vh - 24px); }
    .graph-card, .panel, .section, .tree-card, .drill-card, .explorer-card, .relation-drawer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .tree-card, .drill-card, .explorer-card {
      padding: 16px;
      margin-bottom: 14px;
    }
    .graph-card { overflow: hidden; }
    .relation-drawer {
      margin: 14px 0;
      overflow: hidden;
    }
    .relation-drawer > summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 16px;
      cursor: pointer;
      list-style: none;
      border-bottom: 1px solid transparent;
    }
    .relation-drawer[open] > summary { border-bottom-color: var(--line); }
    .relation-drawer > summary::-webkit-details-marker { display: none; }
    .relation-title { display: grid; gap: 3px; }
    .graph-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .graph-titlebar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: start;
      width: 100%;
    }
    .graph-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .graph-head h1 {
      font-size: 20px;
      line-height: 1.12;
    }
    .studio-home-link {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
    }
    .studio-home-link:hover { border-color: #2563eb; text-decoration: none; }
    .metrics, .legend, .actions { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .metric {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 4px 8px;
      font-size: 12px;
    }
    .metric b { color: var(--ink); font-size: 14px; }
    .swatch { width: 11px; height: 11px; border-radius: 3px; background: var(--c); flex: 0 0 auto; }
    .type-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 760px;
    }
    .type-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      border: 1px solid color-mix(in srgb, var(--c) 34%, #dce5f3);
      border-radius: 999px;
      background: color-mix(in srgb, var(--c) 8%, #fff);
      color: #334155;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 650;
      white-space: nowrap;
    }
    .type-chip .swatch {
      width: 10px;
      height: 10px;
    }
    .advanced-controls {
      position: relative;
      display: inline-block;
    }
    .advanced-controls > summary {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #334155;
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
      list-style: none;
    }
    .advanced-controls > summary::-webkit-details-marker { display: none; }
    .advanced-controls[open] > summary {
      border-color: #94a3b8;
      background: #f8fafc;
    }
    .advanced-controls-body {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      z-index: 30;
      width: min(640px, calc(100vw - 32px));
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 44px rgba(15, 23, 42, .16);
      padding: 10px;
    }
    .chip.ok { color: var(--ok); background: #edf9f0; border-color: #b8e4c2; }
    .chip.warn { color: var(--warn); background: #fff7e9; border-color: #efd1a0; }
    .chip.bad { color: var(--danger); background: #fff0f0; border-color: #efbdbd; }
    .chip.info { color: #2563eb; background: #eef4ff; border-color: #c9dcff; }
    .boot-error {
      display: none;
      margin: 10px 14px;
      border: 1px solid #efbdbd;
      border-radius: 8px;
      background: #fff0f0;
      color: #8f1515;
      padding: 10px 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .viewport {
      position: relative;
      height: calc(100vh - 186px);
      min-height: 620px;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
    }
    .viewport.panning { cursor: grabbing; }
    .viewport.drilling {
      cursor: default;
      overflow: auto;
      touch-action: auto;
      user-select: text;
    }
    .viewport.drilling .graph-layer { display: none; }
    .graph-layer {
      position: absolute;
      left: 0;
      top: 0;
      width: 1360px;
      height: 760px;
      transform-origin: 0 0;
    }
    .drill-layer {
      display: none;
      position: absolute;
      inset: 0;
      min-height: 100%;
      padding: 14px;
      overflow: auto;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .14) 1px, transparent 0) 0 0 / 22px 22px,
        linear-gradient(180deg, #ffffff 0%, #f4f8fc 100%);
    }
    .viewport.drilling .drill-layer { display: block; }
    .edge-layer {
      position: absolute;
      inset: 0;
      width: 1360px;
      height: 760px;
      pointer-events: none;
      overflow: visible;
    }
    .edge {
      fill: none;
      stroke: #9aa9bd;
      stroke-width: 2.1;
      opacity: .42;
      marker-end: url(#drillArrow);
    }
    .expand-line {
      fill: none;
      stroke: var(--c);
      stroke-width: 1.7;
      stroke-dasharray: 5 5;
      opacity: .50;
    }
    .edge.active { opacity: .95; stroke: #111827; stroke-width: 3; }
    .edge.dimmed { opacity: .10; }
    .edge-label {
      fill: #475569;
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .edge-label.dimmed { opacity: .12; }
    .node-layer { position: absolute; inset: 0; }
    .module-node {
      position: absolute;
      width: 214px;
      min-height: 116px;
      transform: translate3d(-50%, -50%, 0);
      border: 2px solid color-mix(in srgb, var(--c) 45%, #cbd5e1);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 10px 25px rgba(15, 23, 42, .11);
      padding: 11px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      display: grid;
      gap: 7px;
    }
    .module-node:active { cursor: grabbing; }
    .module-node.selected {
      border-color: #111827;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 20%, transparent), 0 16px 38px rgba(15, 23, 42, .22);
      z-index: 4;
    }
    .module-node.expanded {
      background: linear-gradient(180deg, #fff, color-mix(in srgb, var(--c) 6%, #fff));
      width: 560px;
      min-height: 360px;
      max-height: 520px;
      overflow: auto;
      z-index: 8;
    }
    .module-node.neighbor { box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 16%, transparent), 0 12px 30px rgba(15, 23, 42, .16); }
    .module-node.dimmed { opacity: .22; }
    .module-node.hidden { display: none; }
    .module-node .top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .module-node .kind { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
    .module-node .title {
      display: -webkit-box;
      font-weight: 750;
      font-size: 15px;
      line-height: 1.15;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .module-node .desc { color: #465569; font-size: 12px; }
    .module-node .counts { display: flex; flex-wrap: wrap; gap: 5px; }
    .node-sections {
      display: grid;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .node-section {
      border: 1px solid color-mix(in srgb, var(--section-color) 28%, #dce5f3);
      border-left: 4px solid var(--section-color);
      border-radius: 8px;
      background: rgba(255, 255, 255, .80);
      padding: 7px;
      display: grid;
      gap: 6px;
    }
    .node-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .node-section-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 750;
      font-size: 12px;
    }
    .node-file-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
    }
    .node-file {
      display: grid;
      gap: 3px;
      border: 1px solid #e1e8f2;
      border-radius: 6px;
      background: #f8fafc;
      padding: 6px;
      min-width: 0;
    }
    .node-file-top {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .node-file-name {
      font-weight: 650;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-file-path {
      color: #64748b;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .node-file .tag { font-size: 9px; min-height: 17px; padding: 1px 5px; }
    .expand-toggle {
      width: fit-content;
      height: 28px;
      padding: 0 8px;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      border-color: color-mix(in srgb, var(--c) 40%, var(--line));
      font-size: 12px;
    }
    .child-node {
      position: absolute;
      width: 178px;
      min-height: 86px;
      transform: translate3d(-50%, -50%, 0);
      border: 1px solid color-mix(in srgb, var(--c) 48%, #cbd5e1);
      border-top: 4px solid var(--c);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 9px 20px rgba(15, 23, 42, .10);
      padding: 9px;
      display: grid;
      gap: 5px;
      cursor: pointer;
      z-index: 3;
    }
    .child-node.selected {
      border-color: #111827;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 18%, transparent), 0 12px 26px rgba(15, 23, 42, .18);
    }
    .child-node.dimmed { opacity: .24; }
    .child-node .top { display: flex; align-items: center; gap: 7px; }
    .child-node .title { font-weight: 700; font-size: 13px; line-height: 1.15; }
    .child-node .desc { color: #526070; font-size: 11px; }
    .child-node.file-node {
      width: 154px;
      min-height: 62px;
      border-top-width: 3px;
      padding: 7px;
      z-index: 2;
    }
    .child-node.file-node .title { font-size: 11px; }
    .path-mini {
      color: #64748b;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--c);
      background: color-mix(in srgb, var(--c) 10%, #fff);
      border: 1px solid color-mix(in srgb, var(--c) 34%, #dbe4f0);
      flex: 0 0 auto;
    }
    .icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      display: inline-flex;
      min-height: 19px;
      align-items: center;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--c) 30%, #dbe4f0);
      background: color-mix(in srgb, var(--c) 8%, #fff);
      color: #405066;
      padding: 2px 6px;
      font-size: 10px;
      white-space: nowrap;
    }
    .panel {
      position: sticky;
      top: 82px;
      padding: 14px;
      display: grid;
      gap: 13px;
      max-height: calc(100vh - 100px);
      overflow: auto;
    }
    .block { display: grid; gap: 7px; }
    .muted { color: var(--muted); font-size: 12px; }
    .file {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .list { display: grid; gap: 7px; }
    .mini-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 9px;
      display: grid;
      gap: 5px;
    }
    .section { padding: 16px; margin-top: 14px; }
    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .tree-shell { display: grid; gap: 8px; }
    .tree-root, .tree-branch {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .tree-root { border-color: #cbd5e1; }
    .tree-branch {
      margin: 8px 0 0 28px;
      border-left: 4px solid var(--c);
    }
    .tree-summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--c, #172033) 5%, #fff);
    }
    .tree-summary::-webkit-details-marker { display: none; }
    .tree-summary-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .tree-summary-title { display: grid; gap: 2px; min-width: 0; }
    .tree-summary-title strong { line-height: 1.15; }
    .tree-children {
      border-left: 1px solid #d9e2ef;
      margin-left: 20px;
      padding: 0 0 10px 10px;
    }
    .tree-items {
      display: grid;
      gap: 6px;
      padding: 8px 10px 10px;
    }
    .tree-file {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) minmax(170px, .55fr);
      gap: 8px;
      align-items: start;
      border: 1px solid #e1e8f2;
      border-radius: 7px;
      background: #f8fafc;
      padding: 8px;
      cursor: pointer;
    }
    .tree-file:hover, .tree-file.active {
      border-color: color-mix(in srgb, var(--c) 44%, #cbd5e1);
      background: color-mix(in srgb, var(--c) 7%, #fff);
    }
    .tree-file-main { display: grid; gap: 4px; min-width: 0; }
    .tree-file-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }
    .tree-file-title strong { font-size: 13px; line-height: 1.2; }
    .tree-path {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      color: #475569;
      overflow-wrap: anywhere;
    }
    .tree-role {
      display: grid;
      gap: 4px;
      color: #465569;
      font-size: 12px;
      min-width: 0;
    }
    .tree-empty {
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
    }
    .drill-shell { display: grid; gap: 12px; }
    .drill-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      padding: 10px;
    }
    .crumbs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; color: var(--muted); font-size: 12px; }
    .crumb {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #dce5f3;
      border-radius: 999px;
      background: #fff;
      padding: 3px 8px;
      color: #334155;
    }
    .drill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }
    .drill-node, .drill-file {
      min-width: 0;
      text-align: left;
      border: 1px solid color-mix(in srgb, var(--c) 30%, #dce5f3);
      border-left: 5px solid var(--c);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff, color-mix(in srgb, var(--c) 5%, #fff));
      color: var(--ink);
      padding: 11px;
      display: grid;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .07);
    }
    .drill-node {
      cursor: pointer;
      min-height: 142px;
    }
    .drill-node:hover, .drill-node:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 58%, #94a3b8);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 14%, transparent), 0 13px 26px rgba(15, 23, 42, .12);
      transform: translateY(-1px);
    }
    .drill-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .drill-title { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .drill-title strong { font-size: 14px; line-height: 1.2; overflow-wrap: anywhere; }
    .drill-desc { color: #465569; font-size: 12px; }
    .drill-file {
      grid-template-columns: 24px minmax(0, 1fr);
      min-height: 0;
    }
    .drill-file-body { display: grid; gap: 5px; min-width: 0; }
    .drill-path {

    .graph-tree-board {

      border-radius: 8px;

        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .14) 1px, transparent 0) 0 0 / 22px 22px,

    .tree-level { display: grid; gap: 12px; }

    .tree-current-column { position: relative; min-width: 0; }

    .tree-level-head {

    }
    .tree-toolbar {

      align-items: center;
    }
    .tree-breadcrumb {

    .tree-breadcrumb span + span:before {

    }
    .tree-current-card {
      display: grid;
      gap: 9px;
      border-left: 5px solid var(--c);

      box-shadow: 0 6px 16px rgba(15, 23, 42, .08);

    .tree-current-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .tree-current-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .tree-current-title h3 {
      margin: 0;
      overflow-wrap: anywhere;
    }
    .tree-current-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }
    .tree-children-stack {
      display: grid;
      gap: 10px;
      position: relative;
      min-width: 0;
    }
    .tree-children-stack.has-children:before {

      left: -18px;
      top: 30px;
      bottom: 30px;
      border-left: 2px solid #d9e2ef;
    }
    .graph-tree-node {
      position: relative;
      border: 1px solid color-mix(in srgb, var(--c) 34%, #dce5f3);
      border-left: 5px solid var(--c);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 5px 14px rgba(15, 23, 42, .08);
      color: var(--ink);

      display: grid;
      gap: 8px;
      min-height: 118px;
      padding: 11px;
      text-align: left;
    }
    .graph-tree-node:before {
      content: "";

      left: -23px;
      top: 50%;
      width: 18px;
      border-top: 2px solid #d9e2ef;
    }
    .graph-tree-node:hover, .graph-tree-node:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 58%, #94a3b8);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 12%, transparent), 0 10px 24px rgba(15, 23, 42, .12);
      transform: translateY(-1px);
    }
    .graph-tree-node.selected {
      border-color: #111827;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 16%, transparent), 0 14px 30px rgba(15, 23, 42, .18);
    }
    .tree-node-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .tree-node-title {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-weight: 750;
    }
    .tree-node-title span:last-child { overflow-wrap: anywhere; }
    .tree-node-desc { color: #465569; font-size: 12px; }
    .drill-graph-shell {
      display: grid;
      gap: 10px;
      min-height: 100%;
    }
    .drill-graph-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      min-height: calc(100% - 58px);
    }
    .drill-graph-viewport {
      position: relative;
      min-height: 720px;
      overflow: hidden;
      border-radius: 8px;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
      cursor: grab;
      touch-action: none;
    }
    .drill-graph-viewport.panning {
      cursor: grabbing;
    }
    .drill-graph-pan {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .drill-hierarchy-panel {
      position: sticky;
      top: 58px;
      align-self: start;
      max-height: calc(100vh - 260px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 8px 20px rgba(15, 23, 42, .08);
      padding: 10px;
      display: grid;
      gap: 10px;
    }
    .hierarchy-list {
      display: grid;
      gap: 5px;
    }
    .hierarchy-node {
      min-height: 34px;
      width: 100%;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      border: 1px solid #dce5f3;
      border-left: 4px solid var(--c);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 5px 7px;
      text-align: left;
    }
    .hierarchy-node.current {
      border-color: #111827;
      background: color-mix(in srgb, var(--c) 7%, #fff);
    }
    .hierarchy-node.leaf {
      cursor: default;
      background: #f8fafc;
    }
    .hierarchy-node span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hierarchy-node.depth-1 { margin-left: 10px; width: calc(100% - 10px); }
    .hierarchy-node.depth-2 { margin-left: 20px; width: calc(100% - 20px); }
    .hierarchy-node.depth-3 { margin-left: 30px; width: calc(100% - 30px); }
    .hierarchy-children {
      display: grid;
      gap: 5px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .drill-graph-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 12;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      padding: 10px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .08);
    }
    .drill-toolbar-meta {
      display: grid;
      justify-items: end;
      gap: 6px;
    }
    .drill-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .drill-toolbar-actions button {
      width: auto;
    }
    .drill-graph-canvas {
      position: relative;
      min-height: 720px;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 1px 1px, rgba(100, 116, 139, .16) 1px, transparent 0) 0 0 / 24px 24px,
        linear-gradient(180deg, #fbfdff 0%, #eef5fb 100%);
    }
    .drill-edge-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .drill-edge {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 2;
      opacity: .55;
      marker-end: url(#drillArrow);
    }
    .drill-graph-node {
      position: absolute;
      width: 260px;
      height: auto;
      min-height: 118px;
      transform: translate3d(-50%, -50%, 0);
      border: 1px solid color-mix(in srgb, var(--c) 42%, #cbd5e1);
      border-top: 4px solid var(--c);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 10px 25px rgba(15, 23, 42, .10);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 6px;
      padding: 12px;
      text-align: left;
      z-index: 2;
    }
    .drill-graph-node.center {
      width: 320px;
      min-height: 146px;
      border-color: #111827;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 18%, transparent), 0 16px 38px rgba(15, 23, 42, .18);
      z-index: 3;
    }
    .drill-graph-node.leaf {
      border-top-style: solid;
      background: rgba(248, 250, 252, .96);
      cursor: default;
    }
    .drill-graph-node.hidden-default {
      border-style: dashed;
      background: #fbfcfe;
    }
    .drill-graph-node.hidden-default .drill-node-title::after {
      content: "hidden";
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      border: 1px solid #d8e1ee;
      border-radius: 999px;
      color: #64748b;
      background: #f8fafc;
      padding: 0 6px;
      font-size: 10px;
      font-weight: 700;
    }
    .drill-graph-node.desc-open {
      width: 340px;
      z-index: 20;
    }
    .drill-graph-node:hover, .drill-graph-node:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 65%, #64748b);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 13%, transparent), 0 14px 30px rgba(15, 23, 42, .14);
      transform: translate3d(-50%, -50%, 0) translateY(-1px);
    }
    .drill-node-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .drill-node-title {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      min-width: 0;
      width: 100%;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.18;
    }
    .drill-node-title .icon { flex: 0 0 auto; }
    .drill-graph-node.center .drill-node-title { font-size: 15px; }
    .drill-graph-node.title-fit-sm .drill-node-title { font-size: 13px; }
    .drill-graph-node.title-fit-xs .drill-node-title { font-size: 12px; }
    .drill-graph-node.title-fit-xxs .drill-node-title { font-size: 11px; }
    .drill-node-title span:last-child {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
      text-overflow: clip;
      white-space: normal;
    }
    .drill-node-desc {
      color: #465569;
      font-size: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .drill-graph-node.desc-open .drill-node-desc {
      display: block;
      max-height: 180px;
      overflow: auto;
      -webkit-line-clamp: initial;
      -webkit-box-orient: initial;
    }
    .drill-node-more {
      align-items: center;
      background: transparent;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #334155;
      cursor: pointer;
      display: inline-flex;
      font-size: 11px;
      font-weight: 700;
      justify-content: center;
      min-height: 26px;
      padding: 4px 7px;
      width: fit-content;
    }
    .drill-node-more:hover, .drill-node-more:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 55%, #111827);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 16%, transparent);
    }
    .drill-node-subtitle {
      color: #64748b;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .drill-node-path {
      border: 1px solid #dbe5f1;
      border-radius: 6px;
      background: #fff;
      color: #334155;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      overflow: hidden;
      padding: 5px 6px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .drill-node-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .drill-node-action {
      align-items: center;
      background: #111827;
      border: 1px solid #111827;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-size: 11px;
      font-weight: 700;
      justify-content: center;
      min-height: 28px;
      padding: 5px 7px;
      text-decoration: none;
    }
    .drill-node-action.secondary {
      background: #fff;
      color: #334155;
      border-color: #cbd5e1;
    }
    .drill-node-action:hover, .drill-node-action:focus-visible {
      outline: 0;
      border-color: color-mix(in srgb, var(--c) 55%, #111827);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 16%, transparent);
    }
    .explorer-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
    }
    .explorer-child-list {
      display: grid;
      gap: 7px;
    }
    .explorer-child {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--c);
      border-radius: 7px;
      background: #f8fafc;
      padding: 8px;
      cursor: pointer;
    }
    .explorer-child:hover {
      background: color-mix(in srgb, var(--c) 7%, #fff);
      border-color: color-mix(in srgb, var(--c) 34%, #dce5f3);
    }
    .queue-grid, .protocol-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; }
    .queue-card {
      border: 1px solid var(--line);
      border-top: 4px solid var(--c);
      border-radius: 8px;
      background: #fff;
      padding: 11px;
      display: grid;
      gap: 8px;
    }
    .queue-card.hidden { display: none; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-top: 1px solid var(--line); padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: #f2f5fb; color: var(--muted); font-size: 12px; font-weight: 600; }
    @media (max-width: 1160px) {
      .layout { grid-template-columns: 1fr; }
      .graph-titlebar { grid-template-columns: 1fr; }
      .type-legend { justify-content: flex-start; max-width: none; }
      .drill-graph-layout { grid-template-columns: 1fr; }
      .drill-graph-viewport { order: -1; }
      .drill-hierarchy-panel { position: static; max-height: none; }
      .tree-map-stage { grid-template-columns: 1fr; gap: 12px; }
      .tree-current-column:after, .tree-children-stack.has-children:before, .graph-tree-node:before { display: none; }
      .panel { position: static; max-height: none; }

      .tree-file { grid-template-columns: 22px minmax(0, 1fr); }
      .tree-role { grid-column: 2; }

    @media (max-width: 720px) {
      .shell { width: min(100% - 18px, 1620px); }
      .toolbar { position: static; }
      input, select, button { width: 100%; }

      table, tbody, tr, td { display: block; width: 100%; }

      td { border-top: 0; padding: 6px 10px; }
    }
    @media (max-width: 860px) {
      .studio-sidebar {
        gap: 8px;
        padding: 8px 10px;
      }
      .studio-sidebar-brand {
        padding-bottom: 8px;
      }
      .studio-side-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .studio-nav-section,
      .studio-nav-label {
        display: none;
      }
      .studio-nav-item {
        grid-template-columns: 24px;
        justify-content: center;
        min-height: 32px;
        padding: 4px;
      }
      .architecture-map-content .shell {
        width: min(100% - 12px, 1760px);
        padding-top: 6px;
      }
      .graph-head {
        gap: 6px;
        padding: 8px;
      }
      .graph-head h1 {
        font-size: 18px;
      }
      .graph-head .muted {
        font-size: 12px;
      }
      .type-legend {
        display: none;
      }
      .graph-controls {
        gap: 6px;
      }
      .graph-controls input {
        flex-basis: 100%;
        min-width: 0;
        height: 32px;
      }
      .graph-controls > button,
      .graph-controls > .toggle-control,
      .graph-controls > .chip,
      .advanced-controls > summary,
      .drill-toolbar-actions button {
        width: auto;
        height: 32px;
        min-height: 32px;
      }
      .viewport {
        height: calc(100dvh - 250px);
        min-height: 480px;
      }
      .drill-layer {
        padding: 10px;
      }
      .drill-graph-toolbar {
        gap: 6px;
        padding: 8px;
      }
      .drill-graph-toolbar h2 {
        font-size: 15px;
      }
      .drill-graph-toolbar .legend {
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="studio-shell">
    <aside class="studio-sidebar" aria-label="AI Studio navigation">
      <div class="studio-sidebar-brand">
        <span class="studio-brand-mark">AI</span>
        <div class="studio-brand-copy">
          <strong>AI Studio</strong>
          <span>game pipeline</span>
        </div>
        <button class="studio-sidebar-toggle" type="button" data-studio-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">‹</button>
      </div>

      <nav class="studio-side-nav" aria-label="Primary">
        <p class="studio-nav-section">Workspace</p>
        <a class="studio-nav-item" href="/">
          <span class="studio-nav-icon">S</span>
          <span class="studio-nav-label">Studio Home</span>
        </a>
        <a class="studio-nav-item is-active" href="/architecture_map/">
          <span class="studio-nav-icon map">M</span>
          <span class="studio-nav-label">Architecture Map</span>
        </a>
        <a class="studio-nav-item" href="/taskboard/">
          <span class="studio-nav-icon tasks">T</span>
          <span class="studio-nav-label">Taskboard</span>
        </a>

      </nav>
    </aside>

    <main class="studio-content architecture-map-content">
      <div class="shell">
      <div class="layout graph-only-layout">
        <section class="graph-card" aria-labelledby="graphTitle">
        <div class="graph-head">
          <div class="graph-titlebar">
            <div>
              <h1 id="graphTitle">ai_studio map</h1>
              <p class="muted">Refactor tree from <code>ai_studio/tree.json</code>.</p>
            </div>
            <div class="type-legend" id="typeLegend" aria-label="Node type color legend"></div>
          </div>
          <div class="graph-controls">
            <input id="search" type="search" placeholder="Поиск по модулю, source, skill, utility, risk">
            <label class="toggle-control" title="Show nodes marked hiddenByDefault in ai_studio/tree.json">
              <input id="showHiddenNodes" type="checkbox">
              Show hidden
            </label>
            <span class="chip info" id="hiddenNodeCount">0 hidden</span>
            <button id="resetBtn" type="button">Reset layout</button>
            <button id="fitBtn" type="button" class="secondary">Fit start</button>
            <details class="advanced-controls">
              <summary>More</summary>
              <div class="advanced-controls-body">
                <select id="moduleFilter" aria-label="Module filter"></select>
                <select id="focusMode" aria-label="Focus mode">
                  <option value="local">Local graph: выбранный модуль + соседи</option>
                  <option value="all">All contracts</option>
                  <option value="inventory">Inventory pressure</option>
                </select>
                <button id="zoomInBtn" type="button" class="secondary">Zoom +</button>
                <button id="zoomOutBtn" type="button" class="secondary">Zoom -</button>
                <button id="clearSavedLayoutBtn" type="button" class="secondary">Clear saved layout</button>
                <span class="chip info" id="zoomLabel">100%</span>
                <span class="metric"><b id="moduleCount">0</b> modules</span>
                <span class="metric"><b id="docCount">0</b> md sources</span>
                <span class="metric"><b id="toolCount">0</b> tools</span>
                <span class="metric"><b id="contractCount">0</b> contracts</span>
                <div class="legend" id="legend" hidden></div>
              </div>
            </details>
          </div>
        </div>
        <div class="boot-error" id="bootError"></div>
        <div class="viewport" id="viewport">
          <div class="graph-layer" id="graphLayer">
            <svg class="edge-layer" id="edgeLayer" viewBox="0 0 1360 760" aria-hidden="true">
              <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L0,6 L8,3 z" fill="#9aa9bd"></path>
                </marker>
              </defs>

        (summary.missingDescriptions || 0);
      const categories = [
        ["unmappedInAiStudio", "Unmapped in ai_studio"],
        ["unmappedLegacy", "Unmapped legacy/current files"],
        ["missingInRepo", "Mapped but missing in repo"],
        ["duplicateMappings", "Duplicate mappings"],
        ["missingDescriptions", "Missing descriptions"]
      ];
      function pathOf(item) {
        return item && (item.path || item.id || item.mapping || JSON.stringify(item));
      }
      function countText(value) {
        return esc(String(value == null ? 0 : value));
      }
      function renderCategory(key, title) {
        const items = issues[key] || [];
        if (!items.length) return "";
        const limit = 120;
        const rows = items.slice(0, limit).map((item) => {
          const path = pathOf(item);
          return path
            ? '<a href="' + esc(repoHref(path)) + '" title="' + esc(path) + '">' + esc(path) + '</a>'
            : '<span>' + esc(JSON.stringify(item)) + '</span>';
        }).join("");
        const rest = items.length > limit ? '<p class="map-validation-note">Showing ' + limit + ' of ' + items.length + ' paths.</p>' : "";
        return '<details class="map-validation-category">' +
          '<summary>' + esc(title) + ': ' + items.length + '</summary>' +
          '<div class="map-validation-paths">' + rows + '</div>' + rest +
        '</details>';
      }
      const host = document.getElementById("mapValidationPanel") || document.createElement("details");
      host.id = "mapValidationPanel";
      host.className = "map-validation-panel";
      host.innerHTML =
        '<summary class="map-validation-summary"><span>Map validation</span><span>' + issueCount + ' issues</span></summary>' +
        '<div class="map-validation-body">' +
          '<div class="map-validation-stats">' +
            '<div class="map-validation-stat"><b>' + countText(summary.mappedPaths) + '</b><span>mapped paths</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.scannedFiles) + '</b><span>scanned files</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.unmappedInAiStudio) + '</b><span>unmapped ai_studio</span></div>' +
            '<div class="map-validation-stat"><b>' + countText(summary.unmappedLegacy) + '</b><span>unmapped legacy</span></div>' +
          '</div>' +
          categories.map((entry) => renderCategory(entry[0], entry[1])).join("") +
          '<p class="map-validation-note">Source: <a href="validation-report.json">validation-report.json</a>. Scanner only audits; tree ownership stays in ai_studio/tree.json.</p>' +
        '</div>';
      if (!host.parentNode) document.body.appendChild(host);
    }
    const queueGrid = document.getElementById("queueGrid");
    if (queueGrid) {
      queueGrid.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-select]");
        if (!btn) return;
        selected = btn.dataset.select;
        selectedGroup = firstGroupId(selected);
        syncDrillToSelected("");
        expanded.add(selected);
        moduleFilter.value = "";
        updateAll();
        viewport.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
    function updateAll() {
      updatePositions();
      renderDetail();
      renderQueue();
      renderExplorer();
      updateHiddenNodeCount();
    }
    document.getElementById("resetBtn").addEventListener("click", () => {
      clearSavedLayout();
      drillPositions.clear();
      modules.forEach((m) => { m.x = m.homeX; m.y = m.homeY; m.pinned = false; });
      selected = "hot";
      selectedGroup = "agent-contract";
      syncDrillToSelected("");
      moduleFilter.value = "";
      search.value = "";
      if (showHiddenNodes) showHiddenNodes.checked = false;
      focusMode.value = "local";
      expanded.clear();
      explorerHistory.length = 0;
      explorerSelected = "studio";
      explorerView = "studio";
      setDrillOpen(true);
      fitStart();
      updateAll();
    });
    document.getElementById("clearSavedLayoutBtn").addEventListener("click", () => {
      clearSavedLayout();
      drillPositions.clear();
      modules.forEach((m) => { m.x = m.homeX; m.y = m.homeY; m.pinned = false; });
      updateAll();
    });
    document.getElementById("fitBtn").addEventListener("click", () => {
      if (drillOpen) fitDrillView(true);
      else fitStart();
    });
    document.getElementById("zoomInBtn").addEventListener("click", () => {
      const target = drillOpen && studioExplorerTree ? studioExplorerTree.querySelector(".drill-graph-viewport") : viewport;
      const rect = target.getBoundingClientRect();
      if (drillOpen) setDrillZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, drillZoom * 1.18);
      else setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoom * 1.18);
    });
    document.getElementById("zoomOutBtn").addEventListener("click", () => {
      const target = drillOpen && studioExplorerTree ? studioExplorerTree.querySelector(".drill-graph-viewport") : viewport;
      const rect = target.getBoundingClientRect();
      if (drillOpen) setDrillZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, drillZoom / 1.18);
      else setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoom / 1.18);
    });
    window.addEventListener("keydown", (event) => {
      const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "select" || tag === "textarea") return;
      const rect = viewport.getBoundingClientRect();
      if (event.key === "+" || event.key === "=") {
        setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoom * 1.16);
      } else if (event.key === "-") {
        setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoom / 1.16);
      } else if (event.key === "0") {
        fitStart();
      }
    });
    search.addEventListener("input", updateAll);
    if (showHiddenNodes) {
      showHiddenNodes.addEventListener("change", () => {
        if (!showHiddenNodes.checked) {
          const root = buildExplorerRoot();
          if (!findExplorerNode(root, explorerSelected)) explorerSelected = "studio";
          if (!findExplorerNode(root, explorerView)) explorerView = "studio";
        }
        updateAll();
      });
    }
    focusMode.addEventListener("change", updateAll);
    moduleFilter.addEventListener("change", () => {
      if (moduleFilter.value) {
        selected = moduleFilter.value;
        selectedGroup = firstGroupId(selected);
        syncDrillToSelected("");
      }
      updateAll();
    });
    try {
      restoreSavedLayout();
      renderLegend();
      renderNodes();
      renderEdges();
      applyTransform();
      setDrillOpen(true);
      document.getElementById("moduleCount").textContent = modules.length;
      document.getElementById("docCount").textContent = data.markdownDocs.length;
      document.getElementById("toolCount").textContent = data.tools.length;
      document.getElementById("contractCount").textContent = edgeData.length;
      renderValidationPanel();
      updateAll();
    } catch (error) {
      const bootError = document.getElementById("bootError");
      if (bootError) {
        bootError.style.display = "block";
        bootError.textContent = "Architecture map failed to initialize: " + (error && error.message ? error.message : String(error));
      }
      throw error;
    }
  })();
  </script>
  <script src="/ai_studio/studio_shell/studio_shell.js"></script>
</body>
</html>
