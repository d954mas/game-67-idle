<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canvas</title>
    <link rel="stylesheet" href="/ai_studio/studio_shell/studio_shell.css" />
    <link rel="stylesheet" href="canvas.css" />
  </head>
  <body>
    <div class="studio-shell">
    <!-- The SAME collapsible left sidebar every AI Studio page carries
         (studio_shell.css/.js own layout, collapse state, and styling). -->
    <aside class="studio-sidebar" aria-label="AI Studio navigation">
      <div class="studio-sidebar-brand">
        <span class="studio-brand-mark">AI</span>
        <div class="studio-brand-copy">
          <strong>AI Studio</strong>
          <span>game pipeline</span>
        </div>
        <button class="studio-sidebar-toggle" type="button" data-studio-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">&lsaquo;</button>
      </div>

      <nav class="studio-side-nav" aria-label="Primary">
        <p class="studio-nav-section">Workspace</p>
        <a class="studio-nav-item" href="/">
          <span class="studio-nav-icon">S</span>
          <span class="studio-nav-label">Studio Home</span>
        </a>
        <a class="studio-nav-item" href="/architecture_map/">
          <span class="studio-nav-icon map">M</span>
          <span class="studio-nav-label">Architecture Map</span>
        </a>
        <a class="studio-nav-item" href="/taskboard/">
          <span class="studio-nav-icon tasks">T</span>
          <span class="studio-nav-label">Taskboard</span>
        </a>
        <a class="studio-nav-item" href="/asset_viewer/">
          <span class="studio-nav-icon assets">A</span>
          <span class="studio-nav-label">Asset Viewer</span>
        </a>
        <a class="studio-nav-item is-active" href="/canvas">
          <span class="studio-nav-icon prep">C</span>
          <span class="studio-nav-label">Canvas</span>
        </a>
        <a class="studio-nav-item" href="/quality/">
          <span class="studio-nav-icon quality">Q</span>
          <span class="studio-nav-label">Quality Checks</span>
        </a>

      </nav>
    </aside>

    <main class="studio-content canvas-content">
    <!-- HOME: full-page project card grid (shown when no project is open). -->
    <section id="home-view" class="view">
      <header id="home-bar">
        <h1>Canvas</h1>
        <span class="home-sub">Multi-image projects</span>
      </header>
      <div id="home-grid"></div>
      <div id="home-status" class="status-line">Ready.</div>
    </section>

    <!-- WORKSPACE: full-width editor for one open project. -->
    <section id="workspace-view" class="view hidden">
      <div id="top-bar">
        <button id="back-projects" type="button" title="Back to projects">&larr; Projects</button>
        <span id="ws-title" class="title" title="Double-click to rename">Untitled</span>
        <span class="spacer"></span>
        <button id="add-image" type="button">Add image</button>
        <button id="undo" type="button" disabled>Undo</button>
        <button id="redo" type="button" disabled>Redo</button>
        <span class="divider"></span>
        <button id="zoom-fit" type="button" title="Fit (0)">Fit</button>
        <button id="zoom-100" type="button" title="100% (1)">100%</button>
      </div>

      <div id="ws-body">
        <!-- Left tool rail: thin icon buttons with tooltips + hotkeys. -->
        <div id="tool-rail">
          <button class="tool" data-tool="select" title="Select (V)" aria-label="Select">
            <svg viewBox="0 0 16 16" width="18" height="18"><path d="M3 2l9 4.5-3.7 1.2L7 12z" fill="currentColor"/></svg>
          </button>
          <button class="tool" data-tool="pan" title="Hand / pan (H, hold Space)" aria-label="Hand">
            <svg viewBox="0 0 16 16" width="18" height="18"><path d="M5 7V3.6a1 1 0 0 1 2 0V6h.6V3a1 1 0 0 1 2 0v3.2h.6V4.2a1 1 0 0 1 2 0V9c0 2.5-1.6 4.5-4 4.5S5.4 12 4.6 10.6L3.3 8.4a1 1 0 0 1 1.5-1.3z" fill="currentColor"/></svg>
          </button>
        </div>

        <!-- Left layers panel (collapsible to a slim rail). -->
        <aside id="layers-panel">
          <!-- Slim rail shown ONLY when collapsed: a clear re-open control. -->
          <button id="layers-expand" type="button" title="Show layers" aria-label="Show layers">
            <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M2 3.5h12M2 8h12M2 12.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
            <span class="rail-label">Layers</span>
          </button>
          <header>
            <button id="layers-collapse" type="button" title="Hide layers" aria-label="Hide layers">&#9776;</button>
            <span class="panel-title">Layers</span>
          </header>
          <div id="layers-list"></div>
        </aside>

        <!-- Stage: the pan/zoom canvas plus overlays. tabindex lets a committed
             inline/inspector edit hand focus back here so Ctrl+Z reaches the
             global shortcut instead of the input's own text-undo. -->
        <div id="stage" tabindex="-1">
          <canvas id="canvas"></canvas>
          <div id="empty-hint" class="hidden">Drop images here or press <b>Add image</b></div>
          <div id="drop-overlay" class="hidden"><span>Drop image(s) here</span></div>
          <div id="region-breadcrumb" class="hidden"></div>
          <!-- Nested-group scope breadcrumb (Figma "Screen ▸ Button — Esc to exit"),
               shown when a group has been entered (double-click to drill in). -->
          <div id="scope-breadcrumb" class="hidden"></div>
          <!-- Region-edit tool row (shown only in isolation mode): draw rect, draw
               polygon, or just move — a chip-like floating toolbar under the breadcrumb. -->
          <div id="region-tools" class="hidden">
            <button type="button" class="rtool" data-region-tool="select" title="Select / move (V)">Select</button>
            <button type="button" class="rtool" data-region-tool="rect" title="Draw a rectangle region">Draw Rect</button>
            <button type="button" class="rtool" data-region-tool="polygon" title="Draw a polygon region (click vertices, double-click / Enter to close)">Draw Polygon</button>
          </div>
          <div id="zoom-indicator">100%</div>
        </div>

        <!-- Right inspector panel. -->
        <aside id="inspector"></aside>
      </div>

      <div id="status" class="status-line">Ready.</div>
      <input id="file-input" type="file" accept="image/*" multiple class="hidden" />
    </section>
    </main>
    </div>

    <!-- Right-click context menu (positioned at the pointer, hidden by default). -->
    <div id="context-menu" class="hidden"></div>

    <script src="/ai_studio/studio_shell/studio_shell.js"></script>
    <script type="module" src="canvas.js"></script>
  </body>
</html>
