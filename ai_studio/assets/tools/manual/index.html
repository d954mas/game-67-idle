  <div class="studio-shell">
    <aside class="studio-sidebar" aria-label="AI Studio navigation">

        <div class="studio-brand-copy">

        <p class="studio-nav-section">Workspace</p>
        <a class="studio-nav-item" href="/">
          <span class="studio-nav-icon">S</span>
          <span class="studio-nav-label">Studio Home</span>

        <a class="studio-nav-item" href="/architecture_map/">
