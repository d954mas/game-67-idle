name: Game-owned verification scaffold

# Copied with the game. In a standalone game repository it reconstructs the
# pinned Studio layout and mounts this checkout under games/<game-id>.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  EMSDK_VERSION: '4.0.10'
  STUDIO_REPOSITORY: 'd954mas/game-67-idle'

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout game metadata
        uses: actions/checkout@v7
        with:
          path: .game-metadata
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Resolve exact game and Studio revisions
        id: identity
        shell: bash
        run: |
          node -e "const fs=require('node:fs'); const g=require('./.game-metadata/game.json'); const d=require('./.game-metadata/dependencies.json'); const revisions=[...new Set(d.features.map(x=>x.revision))]; if(!/^[a-z][a-z0-9-]*$/.test(g.id)||revisions.length!==1||!/^[0-9a-f]{40}$/.test(revisions[0])) throw Error('invalid game identity or Studio dependency revisions'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'game_id='+g.id+'\nstudio_revision='+revisions[0]+'\ngame_path=workspace/games/'+g.id+'\n');"
      - name: Checkout exact Studio dependency root
        uses: actions/checkout@v7
        with:
          repository: ${{ env.STUDIO_REPOSITORY }}
          ref: ${{ steps.identity.outputs.studio_revision }}
          path: workspace
          submodules: recursive
          fetch-depth: 0
      - name: Prepare exact game mount
        shell: bash
        run: node -e "require('node:fs').rmSync(process.argv[1],{recursive:true,force:true})" "${{ steps.identity.outputs.game_path }}"
      - name: Checkout game into Studio mount
        uses: actions/checkout@v7
        with:
          path: ${{ steps.identity.outputs.game_path }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Bootstrap Studio Python environment (Ubuntu)
        if: runner.os == 'Linux'
        working-directory: workspace
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$pythonLocation/bin/python"
      - name: Bootstrap Studio Python environment (Windows)
        if: runner.os == 'Windows'
        working-directory: workspace
        run: node ai_studio/dev_environment/python_setup.mjs --base-python "$env:pythonLocation\python.exe"
      - name: Install native Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build clang libwayland-bin libwayland-dev wayland-protocols libxkbcommon-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev
      - name: Prepare space-free CMake path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmakeBin = Split-Path -Parent (Get-Command cmake).Source
          $cmakeRoot = Split-Path -Parent $cmakeBin
          New-Item -ItemType Directory -Force workspace/.toolchains | Out-Null
          Copy-Item -Recurse -LiteralPath $cmakeRoot -Destination workspace/.toolchains/cmake
          "$(Resolve-Path workspace/.toolchains/cmake/bin)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install deterministic Emscripten
        shell: bash
        working-directory: workspace
        run: |
          git clone --depth 1 --branch "$EMSDK_VERSION" https://github.com/emscripten-core/emsdk.git .toolchains/emsdk
          ./.toolchains/emsdk/emsdk install "$EMSDK_VERSION"
          ./.toolchains/emsdk/emsdk activate "$EMSDK_VERSION"
          EMSDK_PATH="$(pwd)/.toolchains/emsdk"
          if [ "$RUNNER_OS" = "Windows" ]; then EMSDK_PATH="$(pwd -W)/.toolchains/emsdk"; fi
          echo "EMSDK=$EMSDK_PATH" >> "$GITHUB_ENV"
      - name: Verify game and final itch ZIP
        working-directory: ${{ steps.identity.outputs.game_path }}
        run: node tools/game.mjs verify --target itch
